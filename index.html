<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3ecf8e">
    <title>Chatuz - Zamonaviy Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
</head>
<body>
    <!-- LOADING SCREEN -->
    <div id="loading-screen">
        <div class="loader">
            <div class="spinner"></div>
            <p>Chatuz yuklanmoqda...</p>
        </div>
    </div>

    <!-- AUTH BO'LIMI -->
    <div id="auth-section" class="hidden">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fas fa-comments"></i>
                <h1>Chatuz</h1>
                <p>Zamonaviy habarlashuv</p>
            </div>
            
            <div class="auth-tabs">
    <button class="tab-btn active" onclick="switchTab('login', this)">Kirish</button>
    <button class="tab-btn" onclick="switchTab('register', this)">Ro'yxatdan o'tish</button>
            <!-- LOGIN FORM -->
            <div id="login-form" class="auth-form active">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="Email manzilingiz" autocomplete="email">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Parol" autocomplete="current-password">
                    <button class="toggle-password" onclick="togglePassword('login-password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <button class="auth-btn" onclick="signIn()">
                    <i class="fas fa-sign-in-alt"></i> Tizimga kirish
                </button>
                <p class="auth-error" id="login-error"></p>
                
                <div class="auth-divider">
                    <span>yoki</span>
                </div>
                
                <div class="social-login">
                    <button class="social-btn" onclick="signInWithGoogle()">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button class="social-btn" onclick="socialLogin('github')">
                        <i class="fab fa-github"></i> GitHub
                    </button>
                </div>
            </div>

            <!-- REGISTER FORM -->
            <div id="register-form" class="auth-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="register-name" placeholder="To'liq ismingiz" autocomplete="name">
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="register-email" placeholder="Email manzilingiz" autocomplete="email">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="register-password" placeholder="Parol (kamida 6 ta belgi)" autocomplete="new-password">
                    <button class="toggle-password" onclick="togglePassword('register-password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <button class="auth-btn" onclick="signUp()">
                    <i class="fas fa-user-plus"></i> Ro'yxatdan o'tish
                </button>
                <p class="auth-error" id="register-error"></p>
                <!-- ⭐ GOOGLE TUGMASI - SHU YERGA QO'SHING -->
    <div class="auth-divider">
        <span>yoki</span>
    </div>
    
    <button class="social-btn google" onclick="signInWithGoogle()">
        <i class="fab fa-google"></i> Google orqali ro'yxatdan o'tish
    </button>
            </div>
        </div>
    </div>

    <!-- CHAT BO'LIMI (avvalgidek, biroz yangilangan) -->
    <div id="chat-section" class="hidden">
        <!-- Mobile overlay -->
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
        
        <aside class="sidebar">
            <!-- ... (avvalgi sidebar kodi) ... -->
        </aside>

        <main class="main-content">
            <!-- ... (avvalgi main content kodi) ... -->
        </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
